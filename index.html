<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladekosten Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
input, button, select { padding: 8px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; }
.card { border:1px solid #ddd; padding:12px; border-radius:10px; margin-bottom:12px; }
.flex { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
</style>
</head>

<body>

<h2>Ladekosten Tracker</h2>

<div class="card">
<strong>Tarife</strong>
<div class="flex">
<label>Zuhause €/kWh: <input type="number" id="tariff_home" step="0.001"></label>
<label>Kerstin €/kWh: <input type="number" id="tariff_kerstin" step="0.001"></label>
<button onclick="saveTariffs()">Speichern</button>
</div>
</div>

<div class="card">
<strong>Neuer Ladevorgang</strong>
<div class="flex">
<label>Datum: <input type="date" id="date"></label>
<label>kWh: <input type="number" id="kwh" step="0.1"></label>

<label>Ladeort:
<select id="location" onchange="updatePrice()">
<option value="Zuhause">Zuhause</option>
<option value="Kerstin">Kerstin</option>
</select>
</label>

<label>Preis €/kWh: <input type="number" id="price" disabled></label>

<button onclick="addEntry()">Speichern</button>
</div>
</div>

<div class="card">
<strong>Filter</strong>
<div class="flex">
<label>Monat:
<select id="filter_month">
<option value="">Alle</option>
<option value="01">Jan</option>
<option value="02">Feb</option>
<option value="03">Mär</option>
<option value="04">Apr</option>
<option value="05">Mai</option>
<option value="06">Jun</option>
<option value="07">Jul</option>
<option value="08">Aug</option>
<option value="09">Sep</option>
<option value="10">Okt</option>
<option value="11">Nov</option>
<option value="12">Dez</option>
</select>
</label>

<label>Ladeort:
<select id="filter_location">
<option value="">Alle</option>
<option value="Zuhause">Zuhause</option>
<option value="Kerstin">Kerstin</option>
</select>
</label>

<button onclick="render()">Anwenden</button>
</div>
</div>

<h3>Auswertung</h3>
<div id="summary" style="font-weight:bold; margin:10px 0;"></div>
<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Ort</th>
<th>kWh</th>
<th>Kosten €</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div style="margin-top:10px;">
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('evData')) || [];
let tariffs = JSON.parse(localStorage.getItem('tariffs')) || { Zuhause:0.30, Kerstin:0.30 };

function parseNumber(v){ if(!v) return NaN; return parseFloat(v.replace(",",".")); }

function loadTariffs(){
 document.getElementById('tariff_home').value = tariffs.Zuhause;
 document.getElementById('tariff_kerstin').value = tariffs.Kerstin;
}

function saveTariffs(){
 const z=parseNumber(tariff_home.value);
 const k=parseNumber(tariff_kerstin.value);
 if(isNaN(z)||isNaN(k)){ alert("Ungültige Tarife"); return; }
 tariffs.Zuhause=z; tariffs.Kerstin=k;
 localStorage.setItem('tariffs',JSON.stringify(tariffs));
 updatePrice();
}

function updatePrice(){ price.value = tariffs[location.value]; }

function addEntry(){
 const date=dateInput.value;
 const kwh=parseNumber(kwhInput.value);
 const loc=location.value;
 const priceVal=tariffs[loc];

 if(!date||isNaN(kwh)){ alert("Bitte Eingaben prüfen"); return; }

 const cost=kwh*priceVal;
 data.push({date,kwh,cost,location:loc});
 localStorage.setItem('evData',JSON.stringify(data));
 render();
}

function deleteEntry(i){ if(confirm("Löschen?")){ data.splice(i,1); localStorage.setItem('evData',JSON.stringify(data)); render(); }}

function formatDate(d){ const [y,m,day]=d.split("-"); return `${day}.${m}.${y}`; }

function getFiltered(){
 const m=filter_month.value;
 const l=filter_location.value;
 return data.filter(e=>{
 if(m && e.date.substring(5,7)!==m) return false;
 if(l && e.location!==l) return false;
 return true;
 });
}

function render(){
 table.innerHTML="";
 const filtered=getFiltered();
 let monthly={};

 filtered.forEach((e,i)=>{
 table.innerHTML+=`<tr>
 <td>${formatDate(e.date)}</td>
 <td>${e.location}</td>
 <td>${e.kwh.toFixed(1)}</td>
 <td>${e.cost.toFixed(2)}</td>
 <td><button onclick="deleteEntry(${i})">Löschen</button></td>
 </tr>`;

 const key=e.date.substring(0,7);
 monthly[key]=(monthly[key]||0)+e.cost;
 });

 const total=Object.values(monthly).reduce((a,b)=>a+b,0);

 const names={"01":"Jan","02":"Feb","03":"Mär","04":"Apr","05":"Mai","06":"Jun","07":"Jul","08":"Aug","09":"Sep","10":"Okt","11":"Nov","12":"Dez"};
 let txt="Gesamt";
 if(filter_location.value) txt=filter_location.value;
 if(filter_month.value) txt+=` ${names[filter_month.value]}`;

 summary.innerText=`${txt}: ${total.toFixed(2)} €`;

 if(window.chart) chart.destroy();
 chart=new Chart(document.getElementById('chart'),{
 type:'bar',
 data:{ labels:Object.keys(monthly), datasets:[{data:Object.values(monthly)}] }
 });
}

function exportCSV(){
 const filtered=getFiltered();
 let csv="Datum,Ort,kWh,Kosten\n";
 filtered.forEach(e=>{ csv+=`${e.date},${e.location},${e.kwh},${e.cost}\n`; });
 const blob=new Blob([csv],{type:'text/csv'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='ladekosten.csv';
 a.click();
}

function exportPDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 const filtered=getFiltered();
 let y=10;

 doc.setFontSize(16);
 doc.text("Ladekosten Abrechnung",10,y);
 y+=10;

 doc.setFontSize(12);
 doc.text(summary.innerText,10,y);
 y+=10;

 filtered.forEach(e=>{
 doc.text(`${formatDate(e.date)} | ${e.location} | ${e.kwh} kWh | ${e.cost.toFixed(2)} €`,10,y);
 y+=6;
 });

 doc.save("ladekosten.pdf");
}

const dateInput=document.getElementById('date');
const kwhInput=document.getElementById('kwh');

loadTariffs();
updatePrice();
render();
</script>

</body>
</html>
