<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladekosten Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
input, button, select { padding: 8px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; }
.card { border:1px solid #ddd; padding:12px; border-radius:10px; margin-bottom:12px; }
.flex { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.small { color:#666; font-size:12px; }
</style>
</head>
<body>

<h2>Ladekosten Tracker</h2>

<div class="card">
  <strong>Backup & Wiederherstellung</strong>
  <div class="flex">
    <button onclick="backupData()">Backup speichern</button>
    <input type="file" id="fileInput" accept="application/json" onchange="importData(event)">
  </div>
  <div class="small">Backup enthält alle Daten und Tarife.</div>
</div>

<div class="card">
  <strong>Tarife verwalten</strong>
  <div class="flex">
    <label>Zuhause €/kWh: <input type="number" id="tariff_home" step="0.01"></label>
    <label>Kerstin €/kWh: <input type="number" id="tariff_kerstin" step="0.01"></label>
    <button onclick="saveTariffs()">Tarife speichern</button>
  </div>
  <div class="small">Änderungen gelten nur für neue Einträge.</div>
</div>

<div class="card">
  <strong>Filter</strong>
  <div class="flex">
    <label>Jahr: <input type="number" id="filter_year"></label>
    <label>Monat:
      <select id="filter_month">
        <option value="">Alle</option>
        <option value="01">Jan</option>
        <option value="02">Feb</option>
        <option value="03">Mär</option>
        <option value="04">Apr</option>
        <option value="05">Mai</option>
        <option value="06">Jun</option>
        <option value="07">Jul</option>
        <option value="08">Aug</option>
        <option value="09">Sep</option>
        <option value="10">Okt</option>
        <option value="11">Nov</option>
        <option value="12">Dez</option>
      </select>
    </label>
    <label>Ort:
      <select id="filter_location">
        <option value="">Alle</option>
        <option value="Zuhause">Zuhause</option>
        <option value="Kerstin">Kerstin</option>
      </select>
    </label>
    <button onclick="render()">Filter anwenden</button>
  </div>
</div>

<div class="card">
  <strong>Neuer Ladevorgang</strong>
  <div class="flex">
    <label>Datum: <input type="date" id="date"></label>
    <label>kWh: <input type="number" id="kwh" step="0.1"></label>

    <label>Ladeort:
    <select id="location" onchange="updatePrice()">
      <option value="Zuhause">Zuhause</option>
      <option value="Kerstin">Kerstin</option>
    </select>
    </label>

    <label>Preis €/kWh: <input type="number" id="price" disabled></label>
    <label>Verlust %: <input type="number" id="loss" step="1" value="10"></label>
    <button onclick="addEntry()">Speichern</button>
  </div>
</div>

<h3>Auswertung</h3>
<canvas id="chart"></canvas>

<table>
<thead>
<tr><th>Datum</th><th>Ort</th><th>kWh (Auto)</th><th>kWh (Netz)</th><th>Kosten €</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem('evData')) || [];
let tariffs = JSON.parse(localStorage.getItem('tariffs')) || {
  Zuhause: 0.30,
  Kerstin: 0.30
};

function backupData() {
  const backup = { data, tariffs };
  const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ladekosten_backup.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const backup = JSON.parse(e.target.result);
    if (backup.data && backup.tariffs) {
      if (confirm('Bestehende Daten überschreiben?')) {
        data = backup.data;
        tariffs = backup.tariffs;
        localStorage.setItem('evData', JSON.stringify(data));
        localStorage.setItem('tariffs', JSON.stringify(tariffs));
        loadTariffsToUI();
        render();
      }
    } else {
      alert('Ungültige Datei');
    }
  };
  reader.readAsText(file);
}

function loadTariffsToUI() {
  document.getElementById('tariff_home').value = tariffs.Zuhause;
  document.getElementById('tariff_kerstin').value = tariffs.Kerstin;
}

function saveTariffs() {
  tariffs.Zuhause = parseFloat(document.getElementById('tariff_home').value);
  tariffs.Kerstin = parseFloat(document.getElementById('tariff_kerstin').value);
  localStorage.setItem('tariffs', JSON.stringify(tariffs));
  updatePrice();
}

function updatePrice() {
  const location = document.getElementById('location').value;
  document.getElementById('price').value = tariffs[location];
}

function addEntry() {
  const date = document.getElementById('date').value;
  const kwh = parseFloat(document.getElementById('kwh').value);
  const location = document.getElementById('location').value;
  const price = tariffs[location];
  const loss = parseFloat(document.getElementById('loss').value) / 100;

  const netKwh = kwh / (1 - loss);
  const cost = netKwh * price;

  data.push({ date, kwh, netKwh, cost, location });
  localStorage.setItem('evData', JSON.stringify(data));

  render();
}

function applyFilter(entry) {
  const year = document.getElementById('filter_year').value;
  const month = document.getElementById('filter_month').value;
  const location = document.getElementById('filter_location').value;

  if (year && !entry.date.startsWith(year)) return false;
  if (month && entry.date.substring(5,7) !== month) return false;
  if (location && entry.location !== location) return false;

  return true;
}

function render() {
  const table = document.getElementById('table');
  table.innerHTML = '';

  let monthly = {};

  const filtered = data.filter(applyFilter);

  filtered.forEach(entry => {
    const tr = `<tr><td>${entry.date}</td><td>${entry.location}</td><td>${entry.kwh.toFixed(1)}</td><td>${entry.netKwh.toFixed(1)}</td><td>${entry.cost.toFixed(2)}</td></tr>`;
    table.innerHTML += tr;

    const monthKey = entry.date.substring(0,7);
    monthly[monthKey] = (monthly[monthKey] || 0) + entry.cost;
  });

  const labels = Object.keys(monthly);
  const values = Object.values(monthly);

  if (window.chart) window.chart.destroy();

  window.chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: labels, datasets: [{ data: values }] }
  });
}

loadTariffsToUI();
updatePrice();
render();
</script>

</body>
</html>
